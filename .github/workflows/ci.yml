name: CI

permissions:
  contents: read

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen --all-extras

      - name: Lint
        run: uv run ruff check .

      - name: Format check
        run: uv run ruff format --check .

      - name: Type check
        run: uv run mypy src/ --strict

      - name: Test
        run: uv run pytest tests/ -v --no-header

      - name: Build Docker image
        run: docker build --platform linux/amd64 -t azure-cost-agent:ci .

      - name: Validate Terraform
        uses: hashicorp/setup-terraform@v4
      - run: |
          cd infra/foundation && terraform init -backend=false && terraform validate
          cd ../../infra/container-app && terraform init -backend=false && terraform validate
